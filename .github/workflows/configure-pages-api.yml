name: Configure GitHub Pages API URL

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: 'Backend-URL mit /api, z.B. https://bewerbungen.onrender.com/api'
        required: true
        type: string

permissions:
  contents: read
  actions: write

jobs:
  set-secret-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Set VITE_API_URL secret
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh secret set VITE_API_URL --body "${{ inputs.api_url }}" --repo ${{ github.repository }}

      - name: Trigger Pages deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "Deploy to GitHub Pages" --repo ${{ github.repository }}
